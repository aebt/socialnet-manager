<!doctype html>
<html lang="en" data-bs-theme="light">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SocialNet Manager</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com" /> 
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin /> 
    <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" /> 
    
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous">
      
    <link rel="stylesheet" href="css/style.css">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  </head>
  <body>

    <header id="app-header">
      <h1 id="app-title">LBYCPG3 SocialNet App - Profile Manager</h1>
    </div>
    </header>

    <div id="app-wrapper">
      <main class="container-fluid flex-grow-1 py-3">
        <div class="row g-3 h-100">
          
          <div class="col-12 col-md-4">
            <div class="sn-panel">
              <h6 class="fw-bold text-primary border-bottom pb-2 mb-3">Profile Management</h6>
              
              <label for="input-name" class="form-label fw-semibold small">Name</label>
              <div class="input-group mb-2">
                <input type="text" id="input-name" class="form-control form-control-sm" placeholder="Enter full name">
                <button id="btn-add" class="btn btn-primary btn-sm">Add</button>
              </div>
              
              <div class="input-group mb-2">
                <input type="text" id="input-name" class="form-control sn-input mb-2" placeholder="Enter profile name" />
              </div>
              
              <button id="btn-delete" class="btn btn-danger btn-sm w-100 mb-3">
                Delete Selected Profile
              </button>

              <p class="small fw-semibold text-muted mb-1">Profiles</p>
              <div id="profile-list" class="profile-list-box"></div>
            </div>
          </div>
          
          <div class="col-12 col-md-4">
            <div class="sn-panel text-center">
              <h6 class="fw-bold text-primary border-bottom pb-2 mb-3">Profile Information</h6>
              
              <img id="profile-pic"
                src="resources/images/default.png"
                alt="Profile picture"
                class="profile-thumb" />
                
              <h4 id="profile-name" class="profile-hero-name">No Profile Selected</h4>
              
              <div id="profile-status" class="sn-textbox mb-3">&mdash;</div>
              
              <div id="profile-quote" class="sn-textbox mb-3">&mdash;</div>
              
              <p class="small fw-semibold text-start text-muted mb-1">Friends</p>
              <div id="friends-list" class="sn-textbox sn-textbox--tall"></div>
              
              </div>
          </div>
          
          <div class="col-12 col-md-4">
            <div class="sn-panel">
              <h6 class="fw-bold text-primary border-bottom pb-2 mb-3">Edit Profile</h6>
              
              <label class="form-label fw-semibold small">Change Status</label>
              <div class="input-group mb-3">
                <input type="text" id="input-status" class="form-control form-control-sm" placeholder="New status message">
                <button id="btn-status" class="btn btn-primary btn-sm">Change</button>
              </div>
              
              <label class="form-label fw-semibold small">Change Picture</label>
              <div class="input-group mb-3">
                <input type="text" id="input-picture" class="form-control form-control-sm" placeholder="e.g. resources/ada.png">
                <button id="btn-picture" class="btn sn-btn-blue w-100 mb-3">Update Picture</button>
              </div>
              
              <label class="form-label fw-semibold small">Add Friend</label>
              <div class="input-group mb-3">
                <input type="text" id="input-friend" class="form-control sn-input mb-2">
                <button id="btn-add-friend" class="btn sn-btn-green flex-grow-1">Add Friend</button>
              </div>
              
              <label class="form-label fw-semibold small">Remove Friend</label>
              <div class="input-group mb-3" placeholder="Friend's full name">
                <button id="btn-remove-friend" class="btn sn-btn-orange flex-grow-1">Remove</button>
              </div>
            </div>
          </div>
        </div>
    </main>
    <footer id="status-bar">
        <span id="status-message">Ready. Select a profile from the list.</span>
    </footer>
</div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"></script>
      
    <script src="js/app.js"></script>
  </body>
</html>
