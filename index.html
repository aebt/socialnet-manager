<!doctype html>
<!doctype html>
<html lang="en" data-bs-theme="light">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SocialNet Manager</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com" /> 
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin /> 
    <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" /> 
    
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous">
      
    <link rel="stylesheet" href="css/style.css">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  </head>
  <body>

    <header id="app-header" class="text-white text-center py-2">
      <h4 id="app-title" class="mb-0 fw-bold font-serif">LBYCPG3 SocialNet App - Profile Manager</h4>
    </header>

    <div id="app-wrapper" class="container-fluid py-3 flex-grow-1 d-flex flex-column">
      <main class="row g-3 flex-grow-1 h-100">
        
        <div class="col-12 col-md-4 d-flex flex-column">
          <div class="sn-panel d-flex flex-column h-100">
            <h6 class="sn-panel-title">PROFILE MANAGEMENT</h6>
            
            <label class="form-label sn-label">Add/Lookup Profile:</label>
            <input type="text" id="input-name" class="form-control mb-2" placeholder="Enter profile name">
            
            <div class="d-flex gap-2 mb-3">
              <button id="btn-add" class="btn sn-btn-blue btn-sm flex-fill fw-bold">Add</button>
              <button id="btn-lookup" class="btn sn-btn-blue btn-sm flex-fill fw-bold">Lookup</button>
              <button id="btn-delete" class="btn btn-danger btn-sm flex-fill fw-bold">Delete</button>
            </div>
            
            <label class="form-label sn-label">All Profiles:</label>
            <div id="profile-list" class="profile-list-box flex-grow-1 overflow-auto border rounded bg-white">
              </div>
          </div>
        </div>
        
        <div class="col-12 col-md-4 d-flex flex-column">
          <div class="sn-panel h-100 d-flex flex-column">
            <h6 class="sn-panel-title">PROFILE INFORMATION</h6>
            
            <div class="d-flex align-items-center mb-4 mt-2">
              <img id="profile-pic" src="resources/images/default.png" alt="Profile" class="profile-thumb me-3 shadow-sm border" />
              <h4 id="profile-name" class="font-serif fw-bold mb-0">No Profile Selected</h4>
            </div>
            
            <label class="form-label sn-label">Current Status:</label>
            <div id="profile-status" class="sn-textbox mb-3 text-muted">&mdash;</div>
            
            <label class="form-label sn-label">Favorite Quote:</label>
            <div id="profile-quote" class="sn-textbox mb-3 text-muted">&mdash;</div>
            
            <label class="form-label sn-label">Friends:</label>
            <div id="friends-list" class="sn-textbox sn-textbox--tall h-auto flex-grow-1 text-muted"></div>
          </div>
        </div>
        
        <div class="col-12 col-md-4 d-flex flex-column">
          <div class="sn-panel d-flex flex-column h-100">
            <h6 class="sn-panel-title">EDIT PROFILE</h6>
            
            <div class="flex-grow-1">
                <label class="form-label sn-label">Change Status:</label>
                <input type="text" id="input-status" class="form-control mb-2" placeholder="Enter new status">
                <button id="btn-status" class="btn sn-btn-blue btn-sm w-100 mb-4 fw-bold">Update Status</button>
                
                <label class="form-label sn-label">Change Favorite Quote:</label>
                <input type="text" id="input-quote" class="form-control mb-2" placeholder="Enter favorite quote">
                <button id="btn-quote" class="btn sn-btn-blue btn-sm w-100 mb-4 fw-bold">Update Quote</button>
                
                <label class="form-label sn-label">Change Picture:</label>
                <input type="text" id="input-picture" class="form-control mb-2" placeholder="Enter image filename">
                <button id="btn-picture" class="btn sn-btn-blue btn-sm w-100 mb-4 fw-bold">Update Picture</button>
                
                <label class="form-label sn-label">Manage Friends:</label>
                <input type="text" id="input-friend" class="form-control mb-2" placeholder="Enter friend's name">
                <div class="d-flex gap-2">
                  <button id="btn-add-friend" class="btn btn-success btn-sm flex-fill fw-bold">Add Friend</button>
                  <button id="btn-remove-friend" class="btn btn-warning btn-sm text-white flex-fill fw-bold" style="background-color: #d97706; border-color: #d97706;">Remove</button>
                </div>
            </div>

            <button id="btn-exit" class="btn btn-secondary btn-sm w-100 fw-bold mt-auto" style="background-color: #475569;">Exit</button>
          </div>
        </div>
        
      </main>
    </div>

    <footer id="status-bar" class="text-white mt-auto">
        <span id="status-message">Ready. Select a profile from the list.</span>
    </footer>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"></script>
      
    <script src="js/app.js"></script>
  </body>
</html>
